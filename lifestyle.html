<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EECU Calculator</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@100..900&display=swap" rel="stylesheet">

</head>
<!--Giving everything an ID b/c of several HTML pages-->

<body>
    <nav id="main-nav">
        <img src="/images/eecu-logo.png">
    </nav>
    <header id="main-header">
        <h1>
            Monthly Budget Calculator
        </h1>
        <div class="steps">
            <div class="step active">
                <div class="circle">1</div>
            </div>

            <div class="step active">
                <div class="circle">2</div>
            </div>

            <div class="step active">
                <div class="circle">3</div>
            </div>

            <div class="step">
                <div class="circle">4</div>
            </div>

            <div class="step">
                <div class="circle">5</div>
            </div>
        </div>
    </header>
    <form>
            <label for="dining">Dining Out</label>
                <input name="dining" type="text" placeholder="$" class="expense">
                <label for="entertainment">Entertainment</label>
                <input name="entertainment" type="text" placeholder="$" class="expense">
                <label for="selfcare">Self-care</label>
                <input name="selfcare" type="text" placeholder="$" class="expense">
                <label for="food">Foos/Groceries</label>
                <input name="food" type="text" placeholder="$" class="expense">
                <label for="Pet">Pet Payment</label>
                <input name="Pet" type="text" placeholder="$" class="expense">
                <label for="car">Car Payment</label>
                <input name="car" type="text" placeholder="$" class="expense">
    </form>
    <a id="nextBtn" href="edu.html">Next</button><!--make sure to move this when you create another section to add it inside-->
    <footer id="main-footer">
        <img src="/images/eecu-logo.png">
    </footer>
