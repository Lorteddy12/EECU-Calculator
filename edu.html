<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EECU Calculator</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@100..900&display=swap" rel="stylesheet">

</head>
<!--Giving everything an ID b/c of several HTML pages-->

<body>
    <nav id="main-nav">
        <img src="/images/eecu-logo.png">
    </nav>
    <header id="main-header">
        <h1>
            Monthly Budget Calculator
        </h1>
        <div class="steps">
            <div class="step active">
                <div class="circle">1</div>
            </div>

            <div class="step active">
                <div class="circle">2</div>
            </div>

            <div class="step active">
                <div class="circle">3</div>
            </div>

            <div class="step active">
                <div class="circle">4</div>
            </div>

            <div class="step">
                <div class="circle">5</div>
            </div>
        </div>
    </header>
    <form>
            <label for="studentLoans">Mortgage</label>
            <input type="text" placeholder="$" name="studentLoans" class="expense">
            <label for="supplies">School Supplies</label>
            <input type="text" placeholder="$" name="supplies" class="expense">
            <label for="tuition">College Tuition</label>
            <input type="text" placeholder="$" name="tuition" class="expense">

    </form>
    <a id="backBtn" href="lifestyle.html">Back</a>
    <a id="nextBtn" href="futureproof.html">Next</a><!--make sure to move this when you create another section to add it inside-->
    <footer id="main-footer">
        <img src="/images/eecu-logo.png">
    </footer>
