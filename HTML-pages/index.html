<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EECU Calculator</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@100..900&display=swap" rel="stylesheet">

</head>
<!--Giving everything an ID b/c of several HTML pages-->

<body>
    <nav id="main-nav">
        <img src="/images/eecu-logo.png">
    </nav>
    <header id="main-header">
        <h1>
            Monthly Budget Calculator
        </h1>
        <div class="steps"> <!--Have to change this for each page, progress bar 
            is colored in html only here at step active-->
            <div class="step active">
                <div class="circle">1</div>
            </div>

            <div class="step">
                <div class="circle">2</div>
            </div>

            <div class="step">
                <div class="circle">3</div>
            </div>

            <div class="step">
                <div class="circle">4</div>
            </div>

            <div class="step">
                <div class="circle">5</div>
            </div>
        </div>
    </header>
    <div id="main-body">

        <div id="dropdown-menu">
            <h2>Select Career</h2>
            <section id="dropdown">

                <select name="careers" id="careers">
                    <option id="placeholder" class="SelectCareer">Select Career</option>
                </select>
            </section>       


            <section class=input>
                <label class="annualSalary">Annual Salary</label>
                <input type=text id="annual" placeholder="$">
            </section>
                <h2 id = "monthlyHead">Monthly Income</h2>
            <section id ="monthlyIncome">

                <label>Salary Wages</label>
                <input type=text id="annual" placeholder="$">
                <label>Other Income</label>
                <input type=text id="annual" placeholder="$">
            </section>
            <h2 id = "taxesHead">taxes</h2>
            <section id="taxes">
                <label>Medicare: 1.45%</label>
                <input type=text id="annual" placeholder="$">
                <label>Social security: 6.2%</label>
                <input type=text id="annual" placeholder="$">
                <label>Federal Income Tax</label>
                <input type=text id="annual" placeholder="$">
                <label>State Tax: 4%</label>
                <input type=text id="annual" placeholder="$">
                <button id="nextBtn" href="housing.html">Next</button>
            </section>
        </div>
        <footer id="main-footer">
            <img src="/images/eecu-logo.png">
        </footer>
</body>
<script src="/script.js"></script>

</html>
