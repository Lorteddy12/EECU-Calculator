<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EECU Calculator</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

<!--Giving everything an ID b/c of several HTML pages-->

<body>
    <nav id="main-nav">
        <img class="nav-img"src="/images/eecu-logo.png">
    </nav>
    <header id="main-header">
        <h1>
            Monthly Budget Calculator
        </h1>
        <div class="steps"> 
            <div class="step active">
                <div class="circle">1</div>
            </div>

            <div class="step active">
                <div class="circle">2</div>
            </div>

            <div class="step">
                <div class="circle">3</div>
            </div>

            <div class="step">
                <div class="circle">4</div>
            </div>

            <div class="step">
                <div class="circle">5</div>
            </div>
        </div>
    </header>

    <h2 id="housing-h2">Housing Expenses</h2>
    <main id="housing">
        <section id="input">
            <form>
                <label>Mortgage</label>
                <input type="text" placeholder="$">
                <label>Home Insurance</label>
                <input type="text" placeholder="$">
                
                <label>Rent</label>
                <input type="text" placeholder="$">
                <label>Water/Gas/Electricity</label>
                <input type="text" placeholder="$">
                <label>Repairs/Maintence</label>
                <input type="text" placeholder="$">
                <label>Phone and Cell</label>
                <input type="text" placeholder="$">
                <label>Internet</label>
                <input type="text" placeholder="$">

            </form>
        </section>
    </main>
    <a id="backBtn" href="index.html">Back</a>
    <a id="nextBtn" href="lifestyle.html">Next</a><!--make sure to move this when you create another section to add it inside-->

        <img class="nav-img"src="/images/eecu-logo.png">
    </footer>
