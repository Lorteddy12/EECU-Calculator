<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EECU Calculator</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@100..900&display=swap" rel="stylesheet">

</head>
<!--Giving everything an ID b/c of several HTML pages-->

<body>
    <nav id="main-nav">
        <img src="/images/eecu-logo.png">
    </nav>
    <header id="main-header">
        <h1>
            Monthly Budget Calculator
        </h1>
        <div class="steps"> 
            <div class="step active">
                <div class="circle">1</div>
            </div>

            <div class="step active">
                <div class="circle">2</div>
            </div>

            <div class="step active">
                <div class="circle">3</div>
            </div>

            <div class="step active">
                <div class="circle">4</div>
            </div>

            <div class="step active">
                <div class="circle">5</div>
            </div>
        </div>
    </header>
    <form>
        <label for="savings">Savings</label>
        <input type="text" placeholder="$" name="savings" class="expense">
        <label for="retirement">Retirement</label>
        <input type="text" placeholder="$" name="retirement" class="expense">
        <label for="emergency">Emergency Fund</label>
        <input type="text" placeholder="$" name="emergency" class="expense">
</form>
    <h3 class="greenish">Ready to see your results?</h3>
    <a id="backBtn" href="edu.html">Back</a>
    <a id="nextBtn" href="completion.html">Next</a><!--make sure to move this when you create another section to add it inside-->
    <footer id="main-footer">
        <img src="/images/eecu-logo.png">
    </footer>
